<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-xl w-[420px] p-8">

        <!-- logo and title -->
        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png" class="w-16">
        </div>
        <h1 class="text-2xl font-semibold text-center">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>

        <!-- username -->
        <label class="text-sm font-medium">Username</label>
        <input id="username" type="text" placeholder="Enter Username" class="border w-full p-3 rounded mt-1 mb-1">
        <p class="text-xs text-purple-600 mb-4">Default: admin</p>

        <!-- password -->
        <label class="text-sm font-medium">Password</label>
        <input id="password" type="password" placeholder="Enter Password" class="border w-full p-3 rounded mt-1 mb-1">
        <p class="text-xs text-purple-600 mb-4">Default: admin123</p>


        <!-- button -->
        <button onclick="login()" class="w-full py-3 text-white font-semibold rounded
         bg-indigo-600 hover:opacity-90">Sign In</button>

        <div class="flex items-center my-6">
            <div class="flex-1 h-px bg-gray-300"></div>
            <p class="px-3 text-gray-500 text-sm">OR</p>
            <div class="flex-1 h-px bg-gray-300"></div>

        </div>

        <!-- demo -->
        <div class="bg-gray-100 p-4 rounded text-center">
            <p class="text-sm text-gray-500 mb-2">Demo Credentials:</p>
            <p class="text-sm"><strong>Username:</strong> admin</p>
            <p class="text-sm"><strong>Password:</strong> admin123</p>

        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
