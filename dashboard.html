<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>GitHub Issues Tracker</title>
    <!-- font awesome-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="bg-gray-100">

    <!-- navbar -->

    <div class="bg-white border-b">
        <div class="max-w-7xl mx-auto flex justify-between items-center p-4">

            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-8">
                <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
            </div>

            <div class="flex gap-2">
                <input id="searchInput" placeholder="Search issues..." class="border px-3 py-2 rounded">
                <button onclick="searchIssues()" class="bg-indigo-600 text-white px-4 rounded">
                    + New Issue
                </button>
            </div>

        </div>
    </div>


    <!-- tabs -->
    <div class="max-w-7xl mx-auto mt-6">
        <div class="bg-white p-4 rounded shadow flex gap-3">
            <button id="allTab" onclick="showAll()" class="tab bg-indigo-600 text-white px-4 py-1 rounded">
                All
            </button>
            <button id="openTab" onclick="filterIssues('open')" class="tab border px-4 py-1 rounded">
                Open
            </button>
            <button id="closedTab" onclick="filterIssues('closed')" class="tab border px-4 py-1 rounded">
                Closed
            </button>

        </div>

    </div>


    <!-- issue count -->
    <div class="bg-white rounded shadow p-4 max-w-7xl mx-auto mt-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-purple-200 p-2 rounded-full">
                <img src="./assets/Aperture.png" alt="">
            </div>

            <div>
                <p class="font-semibold">
                    <span id="issueCount">0</span> Issues
                </p>
                <p class="text-sm text-gray-500">
                    Track and manage your project issues
                </p>
            </div>

        </div>

        <div class="flex gap-4 text-sm">
            <span class="text-green-600">● Open</span>
            <span class="text-purple-600">● Closed</span>

        </div>

    </div>


    <!-- Loader -->

    <div id="loader" class="flex justify-center mt-10 hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-4  border-indigo-600  border-t-transparent"></div>
    </div>

    <!-- Issue Cards -->
    <div id="issuesContainer" class="max-w-7xl mx-auto mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"></div>


    <!-- Modal -->
    <div id="modal" class="fixed inset-0 hidden bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-6 rounded w-96">
            
            <h2 id="modalTitle" class="text-lg font-semibold"></h2>
            <p id="modalDesc" class="text-sm text-gray-600 mt-2"></p>
            <p id="modalAuthor" class="text-sm mt-3"></p>
            <p id="modalPriority" class="text-sm"></p>
            <p id="modalStatus" class="text-sm"></p>
            <button onclick="closeModal()" class="mt-4 bg-purple-600 text-white px-4 py-2 rounded">
                Close
            </button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
